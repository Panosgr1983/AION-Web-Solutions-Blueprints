<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[Business Name] — [Service Description]</title>
    <meta name="description" content="[Meta description with primary keyword + location]" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://[domain].gr/" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preload" href="/images/hero.webp" as="image" fetchpriority="high" />
    <meta property="og:title" content="[Business Name] — [Tagline]" />
    <meta property="og:description" content="[OG Description]" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://[domain].gr/" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:locale" content="el_GR" />
    <meta name="twitter:card" content="summary_large_image" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "[Business Name]",
      "url": "https://[domain].gr/",
      "telephone": "[Phone]",
      "email": "[Email]",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "[Street Address]",
        "addressLocality": "[City]",
        "postalCode": "[Postal Code]",
        "addressCountry": "GR"
      },
      "openingHoursSpecification": [
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Monday", "opens": "09:00", "closes": "21:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Tuesday", "opens": "09:00", "closes": "21:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Wednesday", "opens": "09:00", "closes": "21:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Thursday", "opens": "09:00", "closes": "21:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Friday", "opens": "09:00", "closes": "21:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Saturday", "opens": "09:00", "closes": "15:00" }
      ],
      "priceRange": "€€",
      "areaServed": ["[City]", "[Area1]", "[Area2]", "[Area3]", "[Area4]", "[Area5]"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
